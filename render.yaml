# CivicView — Render deployment blueprint.
# Copyright (c) 2026 Jeffrey Nuez. All rights reserved.
#
# Render auto-creates the resources defined here when you "New +" →
# "Blueprint" and point it at this repo. Two pieces:
#
#   1. civicview-api   — FastAPI backend (Python, free tier)
#   2. civicview-db    — Postgres (free tier, 1GB, retained 30 days)
#
# After first deploy:
#   • DATABASE_URL is auto-injected into civicview-api from the DB.
#   • Set SESSION_SECRET in the dashboard (do NOT commit it). 32+
#     bytes of randomness — `python -c "import secrets;
#     print(secrets.token_urlsafe(48))"` in your terminal.
#   • Set ALLOWED_ORIGINS to the Vercel URL (e.g.
#     "https://civicview.app,https://www.civicview.app").
#   • Set GOOGLE_CIVIC_API_KEY if/when you wire BallotTab live data.
#
# Free-tier note: services sleep after 15 minutes of inactivity and
# wake on the next request (~30s cold start). Fine for a demo URL;
# upgrade to Starter ($7/mo) for always-on if you start showing the
# app to actual investors.

services:
  - type: web
    name: civicview-api
    env: python
    region: oregon            # closest US region to Vercel default
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: civicview-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false           # set in the Render dashboard (secret)
      - key: ALLOWED_ORIGINS
        sync: false           # set after first Vercel deploy
      - key: COOKIE_SECURE
        value: "true"         # production HTTPS — required for SameSite=None
      - key: COOKIE_SAMESITE
        value: "none"         # cross-origin cookie (frontend on Vercel)
      - key: GOOGLE_CIVIC_API_KEY
        sync: false           # optional — leave unset until BallotTab live data is needed
      # AI features (comment classification, post summaries, etc.)
      # are powered by Anthropic's Claude Haiku 4.5. The backend boots
      # fine without this key — AI surfaces just degrade to a
      # "Coming soon" state until the key is set. Get a key from
      # https://console.anthropic.com → API Keys.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional per-day token caps in app/services/ai_service.py.
      # Set both to 0 in dev if you want to disable the safeguard.
      # Defaults are 60M input / 15M output tokens per day (roughly
      # $135 worst-case at Haiku rates).
      - key: AI_DAILY_INPUT_TOKEN_CAP
        sync: false
      - key: AI_DAILY_OUTPUT_TOKEN_CAP
        sync: false
      # Auto-hide threshold for content reports. Defaults to 5; set
      # to 0 to disable. Reports still accumulate either way.
      - key: REPORT_AUTO_HIDE_THRESHOLD
        sync: false
      # Comma-separated list of email addresses with admin powers
      # (access to /api/admin/* + the /admin page). Any rep or
      # citizen account whose email matches gets in. Citizen admins
      # also need verified=True on their account — see
      # DEMO_CITIZEN_ACCOUNTS_JSON below for the seed path. Leaving
      # ADMIN_EMAILS unset means NOBODY is admin — every admin
      # endpoint 403s.
      - key: ADMIN_EMAILS
        sync: false
      # JSON blob seeding citizen accounts at boot. Same shape as
      # backend/demo_citizen_accounts.json. Use this to seed your own
      # admin login without waiting for ID.me — set "verified": true
      # on the entry to mark it non-demo, then add the same email to
      # ADMIN_EMAILS. Idempotent on email.
      - key: DEMO_CITIZEN_ACCOUNTS_JSON
        sync: false
      # Notifications — when a report comes in, email every ADMIN_EMAILS
      # recipient. Powered by Resend (resend.com); set RESEND_API_KEY to
      # enable. NOTIFICATION_FROM_EMAIL must be on a Resend-verified
      # domain (or use onboarding@resend.dev for unverified testing).
      # PUBLIC_APP_URL is spliced into the email's "open the queue" link.
      # REPORT_NOTIFICATIONS_ENABLED is a kill-switch that doesn't
      # require rotating the API key.
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: REPORT_NOTIFICATIONS_ENABLED
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"            # flush logs immediately so Render shows them in real time

databases:
  - name: civicview-db
    plan: free
    region: oregon
    databaseName: civicview
