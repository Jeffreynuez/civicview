<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1400" />
  <title>CivicView /admin — Moderation queue (design)</title>
  <link rel="stylesheet" href="admin-styles.css?v=4" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background: #ececec; }

    /* In a DCArtboard, the AdminPage's `.ad-root` should fill the artboard. */
    .ad-root { width: 100%; height: 100%; }

    /* DC artboard label color tweak for legibility. */
    .dc-artboard__label { font-family: 'Geist', sans-serif !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="admin-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="admin-glyphs.jsx"></script>
  <script type="text/babel" src="admin-shell.jsx"></script>
  <script type="text/babel" src="admin-queue.jsx"></script>
  <script type="text/babel" src="admin-appeals.jsx"></script>
  <script type="text/babel" src="admin-suspended.jsx"></script>
  <script type="text/babel" src="admin-modals.jsx"></script>
  <script type="text/babel" src="admin-page.jsx"></script>
  <script type="text/babel" src="admin-other-pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="viewports" title="View 1 — /admin moderation queue (viewport variants)" subtitle="Desktop 1440 · Tablet 820 (horizontal-scroll for the action cell) · Mobile 390 (card list, horizontal-scroll sub-nav). All three render the same /admin shell (page header band, sub-nav row, KPI strip, filter row, queue). Engineering: 'Suspend' button label is dynamic — 'Suspend citizen' or 'Suspend rep' based on target.author_kind; the modal title swaps to 'Suspend Rep. {name}?' when the target is a rep. Auto-flagged rows (Auto-detect reporter, ⚡ tag) should skip any 'suspend reporter' affordance since there is no human reporter.">
            <DCArtboard id="desktop" label="Desktop · 1440 · Queue with mixed states" width={1440} height={1520}>
              <AdminPage variant="desktop" />
            </DCArtboard>
            <DCArtboard id="tablet" label="Tablet · 820 · Same table, horizontal scroll" width={820} height={1520}>
              <AdminPage variant="tablet" />
            </DCArtboard>
            <DCArtboard id="mobile" label="Mobile · 390 · Card list, horizontal sub-nav scroll" width={390} height={2300}>
              <AdminPage variant="mobile" />
            </DCArtboard>
          </DCSection>

          <DCSection id="modals" title="Destructive-action modals" subtitle="Replacements for the current window.confirm. Hide is single-click. Suspend is single-screen but two sections — confirm + textarea on top, separate 'also hide existing content' opt-in below.">
            <DCArtboard id="hide-modal" label="Hide content · single-click confirm" width={720} height={620}>
              <AdminPage variant="desktop" bareNoNav modal="hide" modalRowIndex={0} />
            </DCArtboard>
            <DCArtboard id="suspend-modal" label="Suspend user · two-section, opt-in hide-history" width={720} height={780}>
              <AdminPage variant="desktop" bareNoNav modal="suspend" modalRowIndex={0} />
            </DCArtboard>
          </DCSection>

          <DCSection id="empty" title="Empty states" subtitle="Two distinct copies: 'no open reports, but resolved exist' celebrates Jeff's day; 'no reports at all' is honest about a brand-new system. Neither uses an exclamation point in the headline.">
            <DCArtboard id="empty-open" label="Zero open reports (resolved history exists)" width={1320} height={780}>
              <AdminPage variant="desktop" emptyState="open" />
            </DCArtboard>
            <DCArtboard id="empty-all" label="Zero reports ever" width={1320} height={780}>
              <AdminPage variant="desktop" emptyState="all" initialIncludeResolved={false} />
            </DCArtboard>
          </DCSection>

          <DCSection id="error" title="Inline error banner" subtitle="Sits above the table when an action fails. Uses cl-danger-soft / -border / -text. Dismissible. Table below stays interactive so Jeff can retry from the View link.">
            <DCArtboard id="error-state" label="Action failed · banner above table" width={1440} height={1560}>
              <AdminPage variant="desktop" showError />
            </DCArtboard>
          </DCSection>

          <DCSection id="access" title="Access states (shared across all three views)" subtitle="Server-side gated. Probing is the ≤1s in-between; unauthed is for signed-out viewers; denied is for signed-in but off-allowlist accounts. Same shell on /admin, /admin/appeals, and /admin/users — the centered-card pattern is part of the reusable admin shell.">
            <DCArtboard id="probing" label="Probing · ≤1s skeleton" width={1100} height={720}>
              <AdminPage variant="desktop" accessState="probing" />
            </DCArtboard>
            <DCArtboard id="unauthed" label="Sign in required" width={1100} height={720}>
              <AdminPage variant="desktop" accessState="unauthed" />
            </DCArtboard>
            <DCArtboard id="denied" label="Admin access required · off-allowlist" width={1100} height={720}>
              <AdminPage variant="desktop" accessState="denied" />
            </DCArtboard>
          </DCSection>

          {/* =========================================================
              View 2 — Appeals queue
              ========================================================= */}
          <DCSection id="appeals-viewports" title="/admin/appeals — Appeals queue (viewport variants)" subtitle="Same shell as the Moderation queue (navbar, page header band, sub-nav row, KPI strip, filter row). Body changes: vertical list of appeal cards, not a table — each appeal carries a longer free-text rationale that doesn't fit a row. Card rows have three states: pending (warning-yellow left border), granted (success-green left border + light green tint), denied (muted left border + muted bg). Mobile keeps the same card list — it's already vertical.">
            <DCArtboard id="appeals-desktop" label="Desktop · 1440 · Pending + 2 resolved" width={1440} height={2200}>
              <AppealsPage variant="desktop" />
            </DCArtboard>
            <DCArtboard id="appeals-tablet" label="Tablet · 820 · Same card list, tighter padding" width={820} height={2300}>
              <AppealsPage variant="tablet" />
            </DCArtboard>
            <DCArtboard id="appeals-mobile" label="Mobile · 390 · Card list stays vertical" width={390} height={2900}>
              <AppealsPage variant="mobile" />
            </DCArtboard>
          </DCSection>

          <DCSection id="appeals-modals" title="Appeals — Grant / Deny confirmation modals" subtitle="Both modals share the same shape: confirmation copy explaining what changes, plus an optional admin-note textarea. The note is encouraged (audit trail) but not required. Grant uses the success eyebrow + accent-green CTA; Deny uses the destructive eyebrow + red CTA.">
            <DCArtboard id="appeals-grant" label="Grant appeal · success eyebrow + accent-green CTA" width={680} height={620}>
              <AppealsPage variant="desktop" bareNoNav modal="grant" modalRowIndex={0} />
            </DCArtboard>
            <DCArtboard id="appeals-deny" label="Deny appeal · destructive eyebrow + red CTA" width={680} height={620}>
              <AppealsPage variant="desktop" bareNoNav modal="deny" modalRowIndex={0} />
            </DCArtboard>
          </DCSection>

          <DCSection id="appeals-empty" title="Appeals — empty state" subtitle="Same empty-state shell as the Moderation queue. Different copy + illustration (a gavel + cleared docket). Sub-nav badge drops to zero when this state is reached.">
            <DCArtboard id="appeals-empty-state" label="No appeals waiting" width={1320} height={800}>
              <AppealsPage variant="desktop" emptyState />
            </DCArtboard>
          </DCSection>

          {/* =========================================================
              View 3 — Suspended accounts
              ========================================================= */}
          <DCSection id="suspended-viewports" title="/admin/users — Suspended accounts (viewport variants)" subtitle="Reuses the Moderation queue's table styling end-to-end. Columns: Kind · Display name · Email · Suspended · Reason · Reports · Actions. Accounts with an open appeal get a light-yellow row tint and an 'Appeal pending →' link in the Reason cell that jumps to the Appeals tab. Mobile collapses to a card list with full-width Unsuspend at the bottom.">
            <DCArtboard id="suspended-desktop" label="Desktop · 1440 · 5 accounts (1 with appeal)" width={1440} height={1280}>
              <SuspendedPage variant="desktop" />
            </DCArtboard>
            <DCArtboard id="suspended-tablet" label="Tablet · 820 · Email column folds away, scroll for rest" width={820} height={1280}>
              <SuspendedPage variant="tablet" />
            </DCArtboard>
            <DCArtboard id="suspended-mobile" label="Mobile · 390 · Card collapse, full-width Unsuspend" width={390} height={2700}>
              <SuspendedPage variant="mobile" />
            </DCArtboard>
          </DCSection>

          <DCSection id="suspended-modal" title="Suspended — Unsuspend confirmation modal" subtitle="Single-screen confirm. Surfaces the suspension record (kind pill, email, when, who suspended, original reason) so Jeff can sanity-check before reversing. If the account has an open appeal, a yellow notice warns that unsuspending also resolves the appeal as granted.">
            <DCArtboard id="unsuspend-modal" label="Unsuspend · with appeal-pending notice" width={680} height={680}>
              <SuspendedPage variant="desktop" bareNoNav modal="unsuspend" modalRowIndex={0} />
            </DCArtboard>
            <DCArtboard id="unsuspend-modal-plain" label="Unsuspend · no pending appeal" width={680} height={580}>
              <SuspendedPage variant="desktop" bareNoNav modal="unsuspend" modalRowIndex={1} />
            </DCArtboard>
          </DCSection>

          <DCSection id="suspended-empty" title="Suspended — empty state" subtitle="Same empty-state shell. Different copy + illustration. Lower-volume page than the moderation queue, so the empty state is the steady-state when CivicView is healthy.">
            <DCArtboard id="suspended-empty-state" label="No suspended accounts" width={1320} height={800}>
              <SuspendedPage variant="desktop" emptyState />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
