<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CivicView — /polls page</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="polls.css" />
  <style>
    /* Canvas-only styles — not lifted into the engineer's bundle */
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { background: #f0eee9; font-family: 'Geist', -apple-system, sans-serif; }

    /* Inside each artboard, we mount a full PollsPage. Reset the artboard
       background so the page paints its own. The artboard is a static frame;
       we never want internal scrolling there, so polls-page can grow tall. */
    .artboard-mount {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: var(--cl-bg);
    }
    /* Disable sticky inside artboards — sticky breaks when the artboard
       isn't the scroll container. */
    .artboard-mount .cv-nav,
    .artboard-mount .cv-nav2,
    .artboard-mount .polls-filters {
      position: static;
    }
    /* Convert the mobile sticky FAB to absolute inside artboards so it
       lands at the bottom-right of the frame instead of the viewport. */
    .artboard-mount .polls-fab {
      position: absolute;
    }

    /* Annotation post-it bubble — tiny rationale notes pinned next to
       artboards. Pure CSS, no glyphs. */
    .rationale {
      background: #fef4a8;
      color: #5a4a2a;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 14px 16px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.45;
      max-width: 100%;
      height: 100%;
      box-sizing: border-box;
      overflow: auto;
    }
    .rationale h4 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8a6f24;
    }
    .rationale p { margin: 0 0 8px; }
    .rationale p:last-child { margin: 0; }
    .rationale strong { color: #2a2418; }
    .rationale ul { margin: 0; padding-left: 18px; }
    .rationale li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="polls-data.js"></script>
  <script type="text/babel" src="polls-glyphs.jsx"></script>
  <script type="text/babel" src="polls-navbar.jsx"></script>
  <script type="text/babel" src="poll-card.jsx"></script>
  <script type="text/babel" src="polls-page.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef } = React;

    // Mount a fully-rendered PollsPage inside an artboard.
    function Mount({ children }) {
      return <div className="artboard-mount" data-screen-label={null}>{children}</div>;
    }
    function Rationale({ title, children }) {
      return (
        <div className="rationale" data-dc-skip-bg="true">
          {title && <h4>{title}</h4>}
          {children}
        </div>
      );
    }

    const PP = window.PollsPage;

    function App() {
      return (
        <DesignCanvas title="CivicView — /polls" subtitle="Refinement pass · new navbar · branch chips · two empty states · responsive">
          <DCSection
            id="responsive"
            title="1. Recommended design — responsive flow"
            subtitle="Same page, three viewport widths. Desktop = 3-col grid + full nav. Tablet/mobile collapse Polls/My Tracked/identity into the hamburger.">

            <DCArtboard id="rec-desktop" label="Desktop · 1440" width={1440} height={2040}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-tablet" label="Tablet · 820" width={820} height={2540}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} navbarViewport="tablet" /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-mobile" label="Mobile · 390" width={390} height={3900}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} navbarViewport="mobile" /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-rationale" label="Refinement notes" width={360} height={580}>
              <Rationale title="What changed in this pass">
                <ul>
                  <li><strong>Navbar</strong> rebuilt to production layout: flag glyph + wordmark left; identity pill, Sign out, Subscribe (yellow), Polls, My Tracked, bell, hamburger right. Compact mode collapses everything except wordmark, Subscribe, bell, hamburger.</li>
                  <li><strong>Branch chips</strong> replace the old author-type chips: Bill / Committee / Executive / Judicial / Standalone, plus a disabled <em>From candidates</em> chip with a <em>Soon</em> badge.</li>
                  <li><strong>Standalone</strong> rendered as a distinct tier — dashed outline + warning-dot prefix — so users intuit it isn't tied to a single page.</li>
                  <li><strong>Mobile hero</strong> stacks top-down; stats render as one row of three compact tiles.</li>
                  <li><strong>Mobile FAB</strong> + bottom CTA solve the "scroll back up to start a poll" problem.</li>
                  <li><strong>Two empty states</strong> shipped (see section 3).</li>
                </ul>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="hero-variants"
            title="2. Hero treatment — two options"
            subtitle="Both use the same eyebrow / title / subhead / stat block. Dark is the recommendation; light is here if you'd rather the page feel uniform with the Constituent Dashboard.">

            <DCArtboard id="hero-dark" label="A · Dark grassroots (recommended)" width={1440} height={1120}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="hero-light" label="B · Light dashboard-style" width={1440} height={1120}>
              <Mount><PP hero="light" state="loaded" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="hero-rationale" label="A vs B" width={360} height={460}>
              <Rationale title="When each works">
                <p><strong>A · Dark grassroots</strong> — pairs with the navy nav chrome above. Best when /polls is a destination users navigate <em>to</em>.</p>
                <p><strong>B · Light dashboard</strong> — sits closer to the Constituent Dashboard's accent-tinted hero. Better when /polls is mostly visited from inside an authenticated session.</p>
                <p>The decision is one CSS class: <code>.polls-hero.is-light</code>.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="states"
            title="3. Content states"
            subtitle="AI filter active · full-page empty · in-grid AI empty · loading skeletons.">

            <DCArtboard id="state-filtered" label="AI filter active" width={1440} height={1120}>
              <Mount><PP hero="dark" state="filtered" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="state-empty-full" label="Full empty — no polls at all" width={1440} height={960}>
              <Mount><PP hero="dark" state="empty" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="state-empty-ai" label="In-grid empty — AI filter returned 0" width={1440} height={960}>
              <Mount><PP hero="dark" state="empty-ai" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="state-loading" label="Loading skeletons" width={1440} height={1320}>
              <Mount><PP hero="dark" state="loading" signedIn={true} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="state-rationale" label="Empty-state notes" width={360} height={500}>
              <Rationale title="Two empty states, not one">
                <p><strong>Full empty</strong> — used when the branch filter alone returns zero. Big card, megaphone glyph, primary <em>Start a poll</em> CTA. Rare in production but right for first-load.</p>
                <p><strong>In-grid AI empty</strong> — the common case. Compact, sits inside the grid as one full-width row, echoes the filter text back (<em>"about Mars colonization"</em>), pairs <em>Clear filter</em> + <em>Start a poll matching this</em>. Reads as part of the feed, not a takeover.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="signed-out"
            title="4. Signed-out variant"
            subtitle="Anonymous viewers see the same feed. Navbar swaps identity + Sign out → Log in + Sign up. Start-a-poll affordances degrade to muted 'Sign in to start a poll'.">

            <DCArtboard id="signed-out-desktop" label="Anonymous · 1440" width={1440} height={1080}>
              <Mount><PP hero="dark" state="loaded" signedIn={false} navbarViewport="desktop" /></Mount>
            </DCArtboard>

            <DCArtboard id="signed-out-mobile" label="Anonymous · 390" width={390} height={2400}>
              <Mount><PP hero="dark" state="loaded" signedIn={false} navbarViewport="mobile" /></Mount>
            </DCArtboard>

            <DCArtboard id="signed-out-rationale" label="Notes" width={360} height={400}>
              <Rationale title="Signed-out rules">
                <p><strong>Don't gate the feed.</strong> Read access for everyone — the page works as the civic-conversation entry point even for first-time visitors.</p>
                <p><strong>Start-a-poll degrades.</strong> Muted white pill + lock glyph + "Sign in to start a poll" preserves the spatial affordance for returning users.</p>
                <p><strong>Mobile FAB</strong> still renders, also muted.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
